<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Dashboard Prototype</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f5faff;
            --border-color: #e1e8ed;
            --text-primary: #1c2a38;
            --text-secondary: #5e6d7a;
            --accent-blue: #007bff;
            --accent-red: #dc3545;
            --accent-green: #28a745;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; }

        .input-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
        }

        .input-group { text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--text-secondary); margin-bottom: 5px; }
        input { padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; width: 120px; }

        button { 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer;
            align-self: flex-end;
        }

        .main-risk-indicator { text-align: center; margin-bottom: 40px; }
        .risk-value { font-size: 5rem; font-weight: 900; margin: 0; transition: color 0.5s; }
        
        .alert-box {
            background-color: var(--card-bg);
            border-left: 5px solid var(--accent-blue);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
        }

        .alert-recommendation { font-size: 1.3rem; font-weight: 700; }

        footer { text-align: center; font-size: 0.85rem; color: #888; margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div>
                <h1>SALA • SAFE-LOAD ANALYTICS</h1>
                <p style="color: var(--text-secondary); margin:0;">Live Risk Intelligence Dashboard</p>
            </div>
            <div style="font-weight: bold; color: var(--text-secondary);">www.safelast.no</div>
        </header>

        <section class="input-section">
            <div class="input-group">
                <label>DRIVING HOURS</label>
                <input type="number" id="hours" value="6.5" step="0.1">
            </div>
            <div class="input-group">
                <label>TEMPERATURE (°C)</label>
                <input type="number" id="temp" value="-5">
            </div>
            <button onclick="calculateSALA()">RUN ANALYSIS</button>
        </section>

        <section class="main-risk-indicator">
            <p style="color: var(--text-secondary); margin: 0;">Calculated Risk Index</p>
            <p class="risk-value" id="risk-display">--%</p>
        </section>

        <section class="alert-box" id="alert-box">
            <p id="alert-title" style="color: var(--text-secondary); font-weight: bold; margin: 0;">ERGONOMIC SAFETY STATUS</p>
            <p class="alert-recommendation" id="rec-text">Waiting for data input...</p>
        </section>

        <footer>
            <p>&copy; 2026 SALA - Safe-Load Analytics | Paulo Fernando De Barros | Larvik, Norway</p>
        </footer>
    </div>

    <script>
        async function calculateSALA() {
            const hours = document.getElementById('hours').value;
            const temp = document.getElementById('temp').value;
            const riskDisplay = document.getElementById('risk-display');
            const recText = document.getElementById('rec-text');
            const alertBox = document.getElementById('alert-box');

            riskDisplay.innerText = "...";

            try {
                const response = await fetch("https://sala-risk-engine-718760302477.europe-north1.run.app", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "driving_hours": parseFloat(hours), "temp": parseFloat(temp) })
                });

                const data = await response.json();
                const risk = data.risk_index;

                riskDisplay.innerText = risk + "%";

                if (risk >= 80) {
                    riskDisplay.style.color = "var(--accent-red)";
                    alertBox.style.borderLeftColor = "var(--accent-red)";
                    recText.innerText = "CRITICAL: MANDATORY USE OF LIFTING EQUIPMENT";
                } else if (risk >= 50) {
                    riskDisplay.style.color = "orange";
                    alertBox.style.borderLeftColor = "orange";
                    recText.innerText = "CAUTION: ERGONOMIC AIDS STRONGLY RECOMMENDED";
                } else {
                    riskDisplay.style.color = "var(--accent-green)";
                    alertBox.style.borderLeftColor = "var(--accent-green)";
                    recText.innerText = "NORMAL: STANDARD ERGONOMIC PROTOCOL";
                }

            } catch (error) {
                riskDisplay.innerText = "ERR";
                recText.innerText = "Connection error with Google Cloud.";
            }
        }
        window.onload = calculateSALA;
    </script>
</body>
</html>
