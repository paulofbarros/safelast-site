<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Driver View</title>
    <style>
        body { 
            background: #0a0e14; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }
        .app-container { width: 90%; max-width: 400px; text-align: center; }
        .risk-circle {
            width: 180px; height: 180px; border-radius: 50%;
            border: 15px solid #1a1f26; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; transition: all 0.4s ease;
        }
        #risk-value { font-size: 3.5rem; font-weight: 900; margin: 0; }
        .input-group { margin-top: 20px; text-align: left; }
        label { display: block; color: #888; font-size: 0.7rem; margin-bottom: 5px; font-weight: bold; }
        input { 
            background: #1a1f26; border: 1px solid #333; color: white; 
            padding: 12px; width: 100%; border-radius: 10px; 
            font-size: 1.1rem; text-align: center; margin-bottom: 15px;
            box-sizing: border-box;
        }
        button { 
            background: #007bff; color: white; border: none; 
            padding: 18px; width: 100%; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        button:active { transform: scale(0.98); }
        .status-msg { margin-top: 20px; font-weight: bold; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <p style="color: #007bff; font-weight: bold; letter-spacing: 2px;">SALA • DRIVER MODE</p>
        
        <div class="risk-circle" id="circle">
            <p id="risk-value">--%</p>
            <span style="font-size: 0.7rem; color: #888;">RISK INDEX</span>
        </div>

        <div id="status" class="status-msg">READY FOR ANALYSIS</div>

        <div class="input-group">
            <label>DRIVING HOURS</label>
            <input type="number" id="hours" value="4.5" step="0.1">
            
            <label>TEMPERATURE (°C)</label>
            <input type="number" id="temp" value="-2">
            
            <button onclick="updateDriverView()">CHECK SAFETY STATUS</button>
        </div>
        
        <a href="index.html" style="color: #444; text-decoration: none; display: block; margin-top: 25px; font-size: 0.8rem;">← Back to Portal</a>
    </div>

    <script>
        async function updateDriverView() {
            const h = document.getElementById('hours').value;
            const t = document.getElementById('temp').value;
            const riskValueText = document.getElementById('risk-value');
            const circle = document.getElementById('circle');
            const status = document.getElementById('status');

            riskValueText.innerText = "...";
            status.innerText = "CALCULATING...";

            try {
                const res = await fetch("https://sala-risk-engine-718760302477.europe-north1.run.app", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "driving_hours": parseFloat(h), "temp": parseFloat(t) })
                });

                const data = await res.json();
                const risk = data.risk_index;
                
                riskValueText.innerText = risk + "%";

                if(risk >= 80) {
                    circle.style.borderColor = "#ff4444";
                    circle.style.boxShadow = "0 0 20px rgba(255, 68, 68, 0.4)";
                    status.innerText = "STOP: MECHANICAL ASSISTANCE REQUIRED";
                    status.style.background = "rgba(255, 68, 68, 0.2)";
                    status.style.color = "#ff4444";
                } else if(risk >= 50) {
                    circle.style.borderColor = "#ffa500";
                    circle.style.boxShadow = "0 0 20px rgba(255, 165, 0, 0.4)";
                    status.innerText = "CAUTION: RISK LEVEL MEDIUM";
                    status.style.background = "rgba(255, 165, 0, 0.2)";
                    status.style.color = "#ffa500";
                } else {
                    circle.style.borderColor = "#28a745";
                    circle.style.boxShadow = "0 0 20px rgba(40, 167, 69, 0.4)";
                    status.innerText = "SAFE TO OPERATE";
                    status.style.background = "rgba(40, 167, 69, 0.2)";
                    status.style.color = "#28a745";
                }
            } catch (error) {
                riskValueText.innerText = "ERR";
                status.innerText = "CONNECTION ERROR";
                console.error(error);
            }
        }
        
        // Inicia com os valores padrão ao carregar
        window.onload = updateDriverView;
    </script>
</body>
</html>
