<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Driver Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #0a0e14; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 400px; text-align: center; }
        .risk-circle { width: 150px; height: 150px; border-radius: 50%; border: 10px solid #1a1f26; margin: 15px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #risk-value { font-size: 2.5rem; font-weight: 900; margin: 0; }
        #reader { width: 100%; background: #1a1f26; border-radius: 12px; margin-bottom: 20px; overflow: hidden; display: none; }
        .btn-scan { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        .input-group { text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        label { display: block; color: #888; font-size: 0.7rem; margin-bottom: 5px; }
        input { background: #1a1f26; border: 1px solid #333; color: white; padding: 8px; width: 100%; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .status-msg { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="app-container">
    <p style="color: #007bff; font-weight: bold; letter-spacing: 2px;">SALA • SMART SCANNER</p>
    
    <div id="reader"></div>
    <button class="btn-scan" id="scan-btn" onclick="startScanner()">[ ] SCAN NEXT PACKAGE</button>

    <div class="risk-circle" id="circle">
        <p id="risk-value">--%</p>
        <span style="font-size: 0.6rem; color: #888;">LIVE RISK</span>
    </div>

    <div id="status" class="status-msg">WAITING FOR SCAN</div>

    <div class="input-group">
        <label>HEAVY PACKAGES COUNT (AUTO)</label>
        <input type="number" id="packages" value="0" readonly>
        
        <label>ESTIMATED MANUAL LOAD (KG)</label>
        <input type="number" id="weight" value="0" readonly>

        <label>DRIVING HOURS</label>
        <input type="number" id="hours" value="4.0">
        
        <label>TEMP (°C)</label>
        <input type="number" id="temp" value="-2">
    </div>
</div>

<script>
    let packageCount = 0;
    let totalWeight = 0;

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('scan-btn').innerText = "CAMERA ACTIVE...";
        
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                // SUCESSO AO LER CÓDIGO
                packageCount++;
                totalWeight += 30; // Simulando que cada pacote bipado tem 30kg
                
                document.getElementById('packages').value = packageCount;
                document.getElementById('weight').value = totalWeight;
                
                html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
                document.getElementById('scan-btn').innerText = "[ ] SCAN NEXT PACKAGE";
                
                updateRisk(); // Atualiza o risco automaticamente após bipar
            }
        ).catch(err => console.error("Erro na câmera", err));
    }

    async function updateRisk() {
        const h = document.getElementById('hours').value;
        const t = document.getElementById('temp').value;
        const p = document.getElementById('packages').value;
        const w = document.getElementById('weight').value / 1000; // Converte kg para toneladas para o motor

        try {
            const res = await fetch("https://sala-risk-engine-718760302477.europe-north1.run.app", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    "driving_hours": parseFloat(h), 
                    "temp": parseFloat(t),
                    "total_weight": parseFloat(w),
                    "heavy_packages": parseInt(p)
                })
            });
            const data = await res.json();
            const risk = data.risk_index;
            document.getElementById('risk-value').innerText = risk + "%";
            
            const circle = document.getElementById('circle');
            if(risk >= 80) circle.style.borderColor = "#ff4444";
            else if(risk >= 50) circle.style.borderColor = "#ffa500";
            else circle.style.borderColor = "#28a745";
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
