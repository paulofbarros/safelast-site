<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Safe-Load Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5c;
            --accent: #0056b3;
            --success: #28a745;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-light: #ffffff;
            --border: #e1e4e8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Bandeiras Centralizadas - Estilo Exato do seu código */
        .lang-switch {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .lang-switch img {
            width: 32px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 2px;
        }
        .lang-switch img.active {
            border-color: var(--accent);
            filter: none;
            opacity: 1;
        }
        .lang-switch img:not(.active) {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        /* Header - Estilo Exato */
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
        }
        .subtitle {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Botões em Formato Vertical */
        .nav-form {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn-access {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        /* Cores específicas dos botões */
        .btn-driver { background-color: #1a1a1a; }
        .btn-dashboard { background-color: var(--primary); }
        .btn-company { background-color: #f8f9fa; color: #333 !important; border: 1px solid var(--border); }

        .btn-access:hover { opacity: 0.9; transform: translateY(-1px); }

        footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <img src="https://flagcdn.com/w40/no.png" alt="Norsk" onclick="setLanguage('no')" id="flag-no">
        <img src="https://flagcdn.com/w40/gb.png" alt="English" onclick="setLanguage('en')" id="flag-en" class="active">
    </div>

    <header>
        <h1 id="main-title">SALA • Safe-Load Analytics</h1>
        <div class="subtitle" id="main-subtitle">Predictive Intelligence for Norwegian Logistics & Transport</div>
    </header>

    <div class="nav-form">
        <a href="driver.html" class="btn-access btn-driver" id="btn-driver">DRIVER APP</a>
        <a href="sala-dashboard.html" class="btn-access btn-dashboard" id="btn-dashboard">LIVE DASHBOARD</a>
        <a href="https://paulofbarros.github.io/safelast-site/company.html" class="btn-access btn-company" id="btn-company">COMPANY ACCESS</a>
    </div>

    <footer>
        © 2026 SALA - Safe-Load Analytics | Biomechanical Risk Research | All rights reserved.
    </footer>

    <script>
        const translations = {
            en: {
                subtitle: "Predictive Intelligence for Norwegian Logistics & Transport",
                driver: "DRIVER APP",
                dashboard: "LIVE DASHBOARD",
                company: "COMPANY ACCESS"
            },
            no: {
                subtitle: "Prediktiv intelligens for norsk logistikk og transport",
                driver: "SJÅFØR APP",
                dashboard: "SANNTIDSDASHBOARD",
                company: "BEDRIFTSTILGANG"
            }
        };

        function setLanguage(lang) {
            document.getElementById('flag-en').classList.toggle('active', lang === 'en');
            document.getElementById('flag-no').classList.toggle('active', lang === 'no');

            const data = translations[lang];
            document.getElementById('main-subtitle').innerText = data.subtitle;
            document.getElementById('btn-driver').innerText = data.driver;
            document.getElementById('btn-dashboard').innerText = data.dashboard;
            document.getElementById('btn-company').innerText = data.company;
        }

        // Inicializa com Inglês ou detecção automática
        const userLang = (navigator.languages && navigator.languages[0]) || navigator.language; 
        if (userLang.startsWith('no') || userLang.startsWith('nb')) {
            setLanguage('no');
        } else {
            setLanguage('en');
        }
    </script>
</body>
</html>
