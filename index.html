<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Biomechanical Risk Management</title>
    <style>
        body { background: #0a0e14; color: #ffffff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Seletor de Idiomas Adicionado */
        .lang-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .lang-nav span { cursor: pointer; font-size: 1.2rem; opacity: 0.6; transition: 0.3s; }
        .lang-nav span:hover { opacity: 1; }
        .lang-nav span.active { opacity: 1; border-bottom: 2px solid #007bff; }

        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        .tagline { color: #007bff; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 90%; max-width: 600px; }
        .card { background: #1a1f26; padding: 40px 20px; border-radius: 15px; text-decoration: none; color: white; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #007bff; transform: translateY(-5px); }
        .card h2 { margin: 0; font-size: 1.2rem; }
        .card p { color: #888; font-size: 0.8rem; margin-top: 10px; }
        
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="lang-nav">
        <span id="btn-en" class="active" onclick="translateTo('en')">🇬🇧</span>
        <span id="btn-no" onclick="translateTo('no')">🇳🇴</span>
    </div>

    <div class="logo">SALA</div>
    <div id="tagline" class="tagline">PREVENTING SICK LEAVE • NORWAY</div>

    <div class="grid">
        <a href="company.html" class="card">
            <h2 id="txt-mgmt-h">Management Portal</h2>
            <p id="txt-mgmt-p">Fleet analytics and risk monitoring.</p>
        </a>
        <a href="drive.html" class="card">
            <h2 id="txt-driver-h">Driver View</h2>
            <p id="txt-driver-p">Real-time risk feedback and scanner.</p>
        </a>
    </div>

    <script>
        const translations = {
            en: {
                tagline: "PREVENTING SICK LEAVE • NORWAY",
                mgmtH: "Management Portal",
                mgmtP: "Fleet analytics and risk monitoring.",
                driverH: "Driver View",
                driverP: "Real-time risk feedback and scanner."
            },
            no: {
                tagline: "FOREBYGGING AV SYKEFRAVÆR • NORGE",
                mgmtH: "Ledelsesportal",
                mgmtP: "Flåteanalyse og risikoovervåking.",
                driverH: "Sjåførvisning",
                driverP: "Sanntids risikotilbakemelding og skanner."
            }
        };

        function translateTo(lang) {
            // Atualiza botões
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-no').classList.toggle('active', lang === 'no');

            // Atualiza textos
            document.getElementById('tagline').innerText = translations[lang].tagline;
            document.getElementById('txt-mgmt-h').innerText = translations[lang].mgmtH;
            document.getElementById('txt-mgmt-p').innerText = translations[lang].mgmtP;
            document.getElementById('txt-driver-h').innerText = translations[lang].driverH;
            document.getElementById('txt-driver-p').innerText = translations[lang].driverP;
        }
    </script>
</body>
</html>
